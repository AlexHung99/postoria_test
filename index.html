<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Postoria 明信片收藏</title>
  <meta name="description" content="Postoria 是收藏、探索與分享世界明信片的社群平台。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#home" aria-label="Postoria 首頁">
      <span class="brand-mark" aria-hidden="true">
        <span class="brand-star">✦</span>
        <span class="brand-wave"></span>
      </span>
      <span class="brand-copy">
        <strong>POSTORIA</strong>
        <small>COLLECT MOMENTS, SHARE THE WORLD.</small>
      </span>
    </a>

    <nav class="desktop-nav" aria-label="主要導覽">
      <a href="#explore" data-scroll="explore"><span>◎</span>探索世界</a>
      <a href="#popular" data-scroll="popular"><span>♨</span>熱門收藏</a>
      <a href="#latest" data-scroll="latest"><span>♡</span>收藏喜愛</a>
    </nav>

    <form class="header-search" data-search>
      <input name="keyword" type="search" placeholder="搜尋標題、編號、#hashtag" aria-label="搜尋明信片">
      <button type="submit" aria-label="搜尋">⌕</button>
    </form>

    <div class="header-actions">
      <a class="ghost-button" href="#login">登入</a>
      <a class="solid-button" href="#register">註冊會員</a>
      <button class="menu-toggle" type="button" aria-label="開啟選單" data-menu-toggle>
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <aside class="mobile-menu" data-mobile-menu aria-hidden="true">
    <button class="menu-close" type="button" aria-label="關閉選單" data-menu-toggle>×</button>
    <a class="brand mobile-brand" href="#home">
      <span class="brand-mark" aria-hidden="true"><span class="brand-star">✦</span><span class="brand-wave"></span></span>
      <span class="brand-copy"><strong>POSTORIA</strong></span>
    </a>
    <nav aria-label="手機導覽">
      <a href="#explore" data-scroll="explore">◎ 探索世界</a>
      <a href="#popular" data-scroll="popular">♨ 熱門收藏</a>
      <a href="#latest" data-scroll="latest">♡ 收藏喜愛</a>
      <a href="#upload">⇧ 上傳明信片</a>
      <a href="#comments">▣ 明信片評論</a>
      <a href="#login">登入</a>
      <a class="solid-button" href="#register">註冊會員</a>
    </nav>
  </aside>

  <main id="app" class="app" aria-live="polite"></main>

  <div class="search-lightbox" data-search-lightbox aria-hidden="true">
    <button class="search-lightbox-backdrop" type="button" data-search-close aria-label="關閉搜尋"></button>
    <section class="search-lightbox-dialog" role="dialog" aria-modal="true" aria-label="搜尋明信片">
      <button class="search-lightbox-close" type="button" data-search-close aria-label="關閉搜尋">×</button>
      <div>
        <strong>搜尋明信片</strong>
        <p>可搜尋標題、編號、城市或 #hashtag</p>
      </div>
      <form class="search-lightbox-form" data-search>
        <input name="keyword" type="search" placeholder="搜尋標題、編號、城市..." aria-label="搜尋明信片">
        <button class="solid-button" type="submit">搜尋</button>
      </form>
    </section>
  </div>

  <nav class="bottom-nav" aria-label="手機底部導覽">
    <a href="#home">⌂<span>首頁</span></a>
    <a href="#explore" data-scroll="explore">⌕<span>探索世界</span></a>
    <a href="#popular" data-scroll="popular">♨<span>熱門收藏</span></a>
    <a href="#latest" data-scroll="latest">♡<span>收藏喜愛</span></a>
    <a href="#login">●<span>會員專區</span></a>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
